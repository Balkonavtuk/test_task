<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платежи</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .chart-container {
            width: 80%;
            max-width: 900px;
            margin: 0 auto;
        }

        .btn {
            padding: 10px 20px;
            margin: 20px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .chart-wrap {
            width: 100%;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1>Визуализация платежей</h1>
        <button class="btn" id="toggleBtn">Показать гистограмму</button>
    </div>

    <div class="chart-container">
        <div id="lineWrap" class="chart-wrap">
            <canvas id="lineChart" width="800" height="400"></canvas>
        </div>

        <div id="barWrap" class="chart-wrap hidden">
            <canvas id="barChart" width="800" height="400"></canvas>
        </div>
    </div>

    <script>
        let chartData = null;
        let lineChartInstance = null;
        let barChartInstance = null;
        let currentChart = 'line';

        fetch('/api/chart-data/')
            .then(response => response.json())
            .then(data => {
                chartData = data;
                initCharts();
            })
            .catch(error => console.error('Ошибка загрузки данных:', error));

        function initCharts() {
            const lineCtx = document.getElementById('lineChart').getContext('2d');
            const lineLabels = chartData.line.map(item => new Date(item.date).toLocaleDateString());
            const lineAmounts = chartData.line.map(item => item.amount);

            lineChartInstance = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: lineLabels,
                    datasets: [{
                        label: 'Сумма платежа',
                        data: lineAmounts,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Дата' } },
                        y: { title: { display: true, text: 'Сумма (руб.)' }, beginAtZero: true }
                    }
                }
            });

            const barCtx = document.getElementById('barChart').getContext('2d');
            const barLabels = chartData.bar.map(item => item.label);
            const barAmounts = chartData.bar.map(item => item.amount);

            barChartInstance = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: barLabels,
                    datasets: [{
                        label: 'Сумма платежа',
                        data: barAmounts,
                        backgroundColor: 'rgba(153, 102, 255, 0.6)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Плательщик' } },
                        y: { title: { display: true, text: 'Сумма (руб.)' }, beginAtZero: true }
                    }
                }
            });

            const lineWrap = document.getElementById('lineWrap');
            const barWrap = document.getElementById('barWrap');

            lineWrap.classList.remove('hidden');
            barWrap.classList.add('hidden');

            document.getElementById('toggleBtn').addEventListener('click', function () {
                if (currentChart === 'line') {
                    lineWrap.classList.add('hidden');
                    barWrap.classList.remove('hidden');
                    this.textContent = 'Показать линейный график';
                    currentChart = 'bar';
                } else {
                    lineWrap.classList.remove('hidden');
                    barWrap.classList.add('hidden');
                    this.textContent = 'Показать гистограмму';
                    currentChart = 'line';
                }
            });
        }
    </script>
</body>
</html>
